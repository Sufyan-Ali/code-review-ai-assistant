<div>Issue No. {{issue().id}}</div>
<div>Issue title:{{issue().title}}</div>
<div>Issue Description:{{issue().description}}</div>
<div>Issue Category:{{issue().category}}</div>
@if (issue().resolved) {
    Resolved
}
@else{
<button class="border cursor-pointer hover:bg-gray-400" (click)="resolveClicked.emit(issue().id)">Resolve</button>}
<br>
