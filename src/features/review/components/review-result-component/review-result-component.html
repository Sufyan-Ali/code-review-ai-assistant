@if(filteredIssues()){<div class="mb-1">
  <label for="languages">Choose language: </label>
  <select [(ngModel)]="selectedFilter" name="filter" id="filter" class="border">
    <option value="all">All ({{issuesCount().all}})</option>
    <option value="open">Open ({{issuesCount().open}})</option>
    <option value="resolved">Resolved({{issuesCount().resolved}})</option>
  </select>
</div>
<app-issue-list-component (resolveClicked)="resolveClicked.emit($event)" [issuesList]="filteredIssues()??[]"/>}
<p>{{reviewResult()?.overallScore}}</p>
